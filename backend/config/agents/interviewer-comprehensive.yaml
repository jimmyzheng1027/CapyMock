id: "interviewer-comprehensive"
prompt_template: "data/prompt/interviewer_comprehensive.md"
llm:
  provider: "dashscope"
  model: "qwen-max"
  temperature: 0.7
  fallback:
    provider: "deepseek"
    model: "deepseek-chat"
    temperature: 0.7
tools:
  - read_resume
  - query_github_analysis
  - take_note
  - read_skill
skills:
  - "interview-technical-followup"
  - "interview-behavior-followup"
context:
  max_history_tokens: 10000
  compact_threshold: 8000
policy:
  max_steps: 15
  parallel_tools: 3
  tool_timeout: 30.0
