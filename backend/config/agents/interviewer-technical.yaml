id: "interviewer-technical"
prompt_template: "data/prompt/interviewer_technical.md"
llm:
  provider: "dashscope"
  model: "qwen-max"
  temperature: 0.7
  fallback:
    provider: "deepseek"
    model: "deepseek-chat"
    temperature: 0.7
tools:
  - read_resume
  - query_github_analysis
  - take_note
  - read_skill
skills:
  - "interview-technical-followup"
context:
  max_history_tokens: 8000
  compact_threshold: 6000
policy:
  max_steps: 10
  parallel_tools: 3
  tool_timeout: 30.0
